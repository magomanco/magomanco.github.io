
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels & Conteúdo Digital | Imago Actio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0c0d12;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-area {
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
        }
        .header-area h1 {
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #00d2ff;
        }
        .header-area p {
            font-size: 14px;
            color: #4a4d5e;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Grid sob medida para formatos de tela vertical (Reels) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }
        .video-item {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16; /* Força a proporção exata do Reels */
            background-color: #16171f;
            border: 1px solid #282a36;
            border-radius: 12px;
            overflow: hidden;
        }
        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Garante que o vídeo preencha toda a área do card */
        }
        .btn-back {
            margin-top: 50px;
            display: inline-block;
            padding: 14px 30px;
            color: #ffffff;
            text-decoration: none;
            background-color: #16171f;
            border: 1px solid #282a36;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            border-color: #00d2ff;
            background-color: #1e202b;
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>Reels & Audiovisual</h1>
        <p>Vídeos dinâmicos e produções em formato vertical</p>
    </div>

    <!-- Substitua o "src" pelos arquivos mp4 locais ou links de vídeo -->
    <div class="video-grid">
        
        <div class="video-item">
            <video controls preload="metadata">
                <source src="video1.mp4" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
        </div>

        <div class="video-item">
            <video controls preload="metadata">
                <source src="video2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <video controls preload="metadata">
                <source src="video3.mp4" type="video/mp4">
            </video>
        </div>

    </div>

    <a href="../" class="btn-back">⬅ Voltar aos Links</a>

</body>
</html>
