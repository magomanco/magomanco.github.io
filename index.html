<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imago Actio | Produção Visual</title>
    <!-- Importando a fonte futurista e geométrica do Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0d12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-area {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ajuste fino e centralização da sua imagem logo.jpg */
        .logo-img {
            width: 130px;       
            height: 130px;      
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 12px; /* Deixa os cantos da imagem levemente arredondados */
        }

        /* TÍTULO IGUAL À LOGO: Fonte robusta, quadrada e imponente */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: 4px; /* Afastamento das letras para dar o visual da logo */
            color: #ffffff;
        }

        /* SUBTÍTULO: Vídeos • Fotos • Edição em Azul Ciano */
        p.subtitle {
            font-family: 'Montserrat', sans-serif;
            color: #00d2ff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 5px; /* Bem espaçado como o rodapé de marcas de mídia */
            text-transform: uppercase;
            margin-bottom: 25px;
            padding-left: 5px; /* Compensa o espaçamento da última letra para manter centralizado */
        }

        .links-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%; 
            align-items: center; 
        }

        .btn-link {
            display: block;
            width: 100%; 
            padding: 16px;
            color: #ffffff;
            text-decoration: none;
            background-color: #16171f;
            border: 1px solid #282a36;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-align: center; 
            text-transform: uppercase; /* Botões em letras maiúsculas para combinar com o estilo */
        }

        .btn-link:hover {
            background-color: #1e202b;
            border-color: #00d2ff;
            transform: translateY(-2px);
        }

        /* Botão de Destaque - Azul Ciano da sua Marca */
        .btn-highlight {
            background-color: #00d2ff;
            color: #0c0d12;
            border: none;
        }

        .btn-highlight:hover {
            background-color: #00b4dc;
            color: #0c0d12;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        footer {
            margin-top: 50px;
            font-size: 10px;
            color: #4a4d5e;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-area">
            <!-- Puxando a sua logo.jpg salva no repositório -->
            <img src="logo.jpg" alt="Imago Actio" class="logo-img">
            
            <h1>IMAGO ACTIO</h1>
            <p class="subtitle">Vídeos • Fotos • Edição</p>
        </div>

        <div class="links-area">
            <!-- Ajuste com seu número real (DDD + Número) -->
            <a href="https://wa.me." target="_blank" class="btn-link btn-highlight">
                ⚡ Agendar Ensaio / Orçamento
            </a>

            <a href="https://instagram.com" target="_blank" class="btn-link">
                📸 Siga no Instagram
            </a>

            <a href="#" target="_blank" class="btn-link">
                ⚽ Portfólio Esportivo
            </a>

            <a href="#" target="_blank" class="btn-link">
                🎬 Reels & Conteúdo Digital
            </a>
        </div>

        <footer>
            &copy; 2026 IMAGO ACTIO.
        </footer>
    </div>

</body>
</html>
